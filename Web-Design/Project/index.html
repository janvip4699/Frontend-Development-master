<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Auto Portal</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel='stylesheet' type='text/css' media='screen' href='css/style.css'>
    <script src='main.js'></script>
</head>
<body>
    <!-- Header section -->
    <section id="auto-portal-header">

        <div class="logo">
            <img src="images/logo.png">
        </div>

        <div class="search-bar">
            <input type="search" name="search-bar" placeholder="Search Vehicles">
            <button><i class="fa fa-search"></i></button>
        </div>

        <div class="account">
            
        </div>

        <div class="cart"></div>
        
    </section>

    <!-- Navbar section -->
    <section id="auto-portal-navbar">
        <div class="new-vehicles"></div>
        <div class="buy-vehicles"></div>
        <div class="sell-vehicles"></div>
        <div class="our-services"></div>
        <div class="reviews"></div>
        <div class="photos-videos"></div>
        <div class="select-city"></div>
    </section>

    <!-- Slider section -->
    <section id="auto-portal-slider">
        <div class="auto-sliders"></div>
    </section>

    <!-- Content section -->
    <section id="auto-portal-content">
        <div class="left-sidebar-content"></div>
        <div class="right-sidebar-content"></div>
    </section>

    <!-- Footer section -->
    <section id="auto-portal-footer">
        <div class="links"></div>
        <div class="connect-us"></div>
    </section>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <script src='main.js'></script>
    <style>
        body
        {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            overflow-x: hidden;
        }
        .header
        {
            width: 100%;
            height: auto;
            padding: 20px;
            background-color: black;
            position: sticky;
            top: 0;
            text-align: center;
            color: white;
        }
        .navbar
        {
            width: 100%;
            height: auto;
            background-color: lightgray;
            padding: 30px;
            text-align: center;
        }
        .slider
        {
            width: 90%;
            height: 350px;
            background-color: aquamarine;
            margin-left: 5%;
            margin-top: 2%;
            text-align: center;
        }
        .content
        {
            width: 90%;
            height: auto;
            margin: auto;
        }
        .leftsidebar
        {
            width: 30%;
            height: 500px;
            margin-top: 3%;
            background-color: cadetblue;
            float: left;
            text-align: center;
        }
        .rightsidebar
        {
            width: 65%;
            height: 500px;
            margin-top: 3%;
            background-color: chocolate;
            float: right;
            text-align: center;
        }
        .footer
        {
            width: 100%;
            height: 250px;
            background-color: black;
            margin-top: 5%;
        }
        .clearfix
        {
            clear: both;
        }
    </style>
</head>
<body>
    <div class="header">Header</div>
    <div class="navbar">Navbar</div>
    <div class="slider">Slider</div>
    <div class="content">
        <div class="leftsidebar">Leftsidebar</div>
        <div class="rightsidebar">Rightsidebar</div>
    </div>
    <div class="clearfix"></div>
    <div class="footer">Footer</div>
</body>
</html>

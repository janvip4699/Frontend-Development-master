<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <script src='main.js'></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js" integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
    <style>
        form
        {
            width: 50%;
            height: auto;
            padding: 10px;
            border: 1px solid black;
            margin: 20px;
        }
        form input
        {
            width: 50%;
            height: auto;
            padding: 10px;
        }
        form input[type="button"]
        {
            width: 50%;
            height: auto;
            background-color: red;
            border: none;
            color: white;
            font-size: 20px;
        }
        form label
        {
            font-size: 25px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <center>
        <form>
            <h1>Check a number odd or even</h1>
            <hr>
            <label>Enter a number : </label>
            <br><br>
            <input type="text" id="num" onblur="display()" placeholder="Enter a number">
            <br><br>
            <input type="button" id="chk" disabled value="submit" class="btn btn-danger" onclick="checkOddEven()">
        </form>
    </center>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function display()
        {
            document.getElementById("chk").disabled=false;
        }
        function checkOddEven()
        {
            var num=document.getElementById("num").value;

            if(num%2 == 0)
            {
                Swal.fire
                ({
                    text: "The entered number is even!",
                    icon: "success"
                });
            }
            else
            {
                Swal.fire
                ({
                    text: "The entered number is odd!",
                    icon: "error"
                });
            }
        }
    </script>
</body>
</html>

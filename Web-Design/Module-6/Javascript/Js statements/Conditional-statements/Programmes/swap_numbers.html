<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <script src='main.js'></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js" integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
    <style>
        form
        {
            width: 50%;
            height: auto;
            padding: 10px;
            border: 1px solid black;
            margin: 20px;
        }
        form input
        {
            width: 50%;
            height: auto;
            padding: 10px;
        }
        form input[type="button"]
        {
            width: 50%;
            height: auto;
            background-color: red;
            border: none;
            color: white;
            font-size: 20px;
        }
        form label
        {
            font-size: 25px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <center>
        <form>
            <h1>Swap Numbers</h1>
            <hr>
            <br><br>
            <input type="text" id="num1" placeholder="Enter first value">
            <br><br>
            <input type="text" id="num2" onblur="display()" placeholder="Enter second value">
            <br><br>
            <input type="button" id="swap" disabled value="submit" class="btn btn-danger" onclick="swapNums()">
        </form>
    </center>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
        function display()
        {
            document.getElementById("swap").disabled=false;
        }
        function swapNums()
        {
            var num1=parseInt(document.getElementById("num1").value);
            var num2=parseInt(document.getElementById("num2").value);

            num1=num1+num2;
            num2=num1-num2;
            num1=num1-num2;

            Swal.fire
                ({
                    text: "After swapping, The first value is : "+num1+" & The second value is : "+num2,
                    icon: "success"
                });
        }
    </script>
</body>
</html>

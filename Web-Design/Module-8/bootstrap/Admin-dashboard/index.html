<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <!-- bootstrap css -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- bootstrap js -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
</head>
<body>
    <script src="login.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Sign IN modal -->
    <div class="container-fluid" id="signin">
        <div class="modal-dialog" style="max-width: 50%;">
            <div class="modal-content p-5 bg-white">
                <!-- SignIN form -->
                <h4 class="text-black p-2 h3 text-center">Admin Login <span class="bi bi-person"></span></h4>
                <div class="row">
                    <img src="https://www.ozstaff.com/images/login.gif" class="img-fluid mx-auto" style="width:300px;height:250px">
                        <form method="post">
                            <div class="form-group mt-3 col-md-6 mx-auto">
                                <input type="email" placeholder="Email *" class="form-control" id="email" required>
                            </div>
                            <div class="form-group mt-3 col-md-6 mx-auto">
                                <input type="password" placeholder="Password *" class="form-control" id="pass" required>
                            </div>
                            <div class="form-group mt-3 col-md-2 mx-auto">
                                <input type="submit" value="SignIN" class="btn btn-md btn-dark text-white" onclick="checkLogin()">
                            </div>
                            <div class="form-group mt-3 col-md-3 mx-auto">
                                <b><a href="login.html">Forgot Password ?</a></b>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>

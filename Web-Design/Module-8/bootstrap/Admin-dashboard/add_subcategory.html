                    <button type="button" class="btn btn-dark position-relative mt-4 ms-4">

                        <label class="input-group-text"><span class="bi bi-plus-lg"></span></label>

                    <div class="input-group ms-2 mt-3 w-50">

                        <input type="text" class="form-control" placeholder="Enter category name*">  
                    </div>
                    <div class="input-group ms-2 mt-3 w-50">
                        <label class="input-group-text"><span class="bi bi-calendar2-plus-fill"></span></label>
                        <input type="date" class="form-control" placeholder="Enter date*">  
                    </div>
                    <div class="input-group ms-2 mt-3 w-50">
                        <input type="submit" name="addcat" value="Add" class="btn btn-md btn-dark">
                        &nbsp; 
                        <input type="reset" name="reset" value="Reset" class="btn btn-md btn-danger">  
                    </div>

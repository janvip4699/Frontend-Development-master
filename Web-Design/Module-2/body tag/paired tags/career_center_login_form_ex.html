<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Page Title</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='main.css'>
    <script src='main.js'></script>
    <style>
        body 
        {
            background: url('https://careercenter.tops-int.com/images/login/login-bg.png') no-repeat;
            background-size: cover;
        }
        a
        {
            color: #4c92be;
            text-decoration: none;
        }
        table
        {
            border: solid 2px #4c92be;
            border-radius: 15px;
            background-color: #edf5fb;
            width: 30%;
            height: 250px;
            margin-top: 10%;
            padding: 40px;
        }
        input 
        {
            width: 80%;
            height: auto;
            margin-left: 10%;
            padding: 10px;
        }
        h1
        {
            font-weight: bold;
            font-size: 25px;
        }
        th 
        {
            font-size: 20px;
            letter-spacing: 2px;
        }
       input[type="submit"]
       {
            width: 50%;
            height: auto;
            margin: auto;
            background-color: #4884b8;
            margin-left: 25%;
            padding: 18px;
            border: none;
            margin-top: 5%;
       }
        
    </style>
</head>
<body>
    <table align="center">
        <tr align="center">
            <th>
                <h1 align="center"><span style="color: #4c92be;">TOPS</span><br>Career Center Login</h1>
            </th>
        </tr>
        <tr>
            <th align="left">&nbsp;&nbsp;&nbsp;&nbsp;Mobile Number</th>
        </tr>
        <tr>
            <td><input type="number" placeholder="Enter Mobile Number" name="MobileNO"></td>
        </tr>
        <tr>
            <th align="left">&nbsp;&nbsp;&nbsp;&nbsp;Password</th>
        </tr>
        <tr>
            <td><input type="password" placeholder="Enter Password" name="password"></td>
        </tr>
        <tr>
            <th align="left"><a href="forgotpassword.html">&nbsp;&nbsp;&nbsp;&nbsp;Forgot Password?</a></th>
        </tr>
        <tr>
            <td><input type="submit" value="Login" name="login"></td>
        </tr>
    </table>
</body>
</html>
